name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create JUnit test result file
        run: |
          mkdir -p test-results
          cat > test-results/results.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites>
            <testsuite name="ExampleSuite" tests="3" failures="0" errors="0" skipped="0" time="1.0">
              <testcase name="test_one" classname="ExampleSuite" time="0.1"/>
              <testcase name="test_two" classname="ExampleSuite" time="0.2"/>
              <testcase name="test_three" classname="ExampleSuite" time="0.3"/>
            </testsuite>
          </testsuites>
          EOF

      - id: action
        uses: .
        continue-on-error: true
        with:
          github_token: fake-token-for-testing
          files: test-results/*.xml
          check_name: 'Basic Test Results'
          commit: ${{ github.sha }}
          comment_title: 'Basic Test Results Comment'
          test_file_prefix: '+src/'
          test_changes_limit: '5'
          check_run: 'false'
          job_summary: 'false'
          comment_mode: 'off'

      - name: Assert action ran (may fail due to no real GitHub token)
        run: |
          echo "Action completed with outcome: ${{ steps.action.outcome }}"
          echo "PASS: action step executed"
